    <style>
        :root {
            --toxic-lime: #ccff00;
            --bg-black: #080808;
            --card-glass: rgba(20, 20, 20, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            background-image: 
                linear-gradient(rgba(204, 255, 0, 0.05) 1px, transparent 1px),

            background-size: 30px 30px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        .main-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            background: var(--card-glass);
            border: 2px solid var(--toxic-lime);
            border-radius: 30px;
            padding: 50px 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(204, 255, 0, 0.2);
        }

        .header-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 24px;
            margin-bottom: 15px;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .header-title span {
            color: var(--toxic-lime);
            text-shadow: 0 0 15px rgba(204, 255, 0, 0.5);
        }

        .warning-strip {
            background: var(--toxic-lime);
            color: #000;
            font-weight: 900;
            font-size: 11px;
            padding: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px -25px 30px -25px;
        }

        .timer-wrap {
            margin-bottom: 35px;
        }

        #timer-text {
            font-size: 75px;
            font-weight: 900;
            letter-spacing: -4px;
            color: #fff;
            line-height: 1;
        }

        .sub-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
        }

        /* Fixed-Style High Conversion Button */
        .join-trigger {
            display: block;
            background: var(--toxic-lime);
            color: #000 !important;
            text-decoration: none;
            padding: 24px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 20px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(204, 255, 0, 0.4);
            transition: 0.3s;
            animation: pulse-border 1.5s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(204, 255, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(204, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(204, 255, 0, 0); }
        }

        .join-trigger:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .system-footer {
            margin-top: 30px;
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

<body>

    <div class="main-container">
        <h1 class="header-title">PREDICTION BY <br><span>PREDICTOR Y</span></h1>
        
        <div class="warning-strip">Limited Slots Available</div>

        <div class="timer-wrap">
            <div id="timer-text">05:00</div>
            <div class="sub-label">Access Window Closing</div>
        </div>

        <a href="https://t.me/+Lmtx81Mv-NYxNDc1" class="join-trigger">
            JOIN TELEGRAM NOW
        </a>

        <div class="system-footer">Encrypted Link • Verified Channel</div>
    </div>

    <script>
        // Countdown Clock
        let timeRemaining = 300;
        const display = document.getElementById('timer-text');
        
        setInterval(() => {
            let minutes = Math.floor(timeRemaining / 60);
            let seconds = timeRemaining % 60;
            display.innerText = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
            if (--timeRemaining < 0) timeRemaining = 300;
        }, 1000);
    </script>       
</body>
